language: "rust"
layer: "application"

env:
  CARGO_TERM_COLOR: "always"

workspace:
  inheritedTasks:
    include: []

fileGroups:
  sources:
    - ".config/**/*"
    - ".moon/**/*"
    - "Cargo.toml"
    - "Cargo.lock"
    - "justfile"
    - "rust-toolchain.toml"
    - "crates/**/*"
    - "internal/**/*"
    - "tools/**/*"
    - "scripts/**/*"
  tests:
    - "crates/**/tests/**/*"
    - "internal/**/benches/**/*"
    - "internal/**/tests/**/*"
    - "tools/**/tests/**/*"

tasks:
  fmt:
    command: "cargo fmt --all"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
    options:
      runInCI: false

  fmt-check:
    command: "cargo fmt --all -- --check"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
    options:
      runInCI: "always"

  clippy:
    command: "cargo clippy --workspace --all-targets -- -D warnings"
    deps:
      - "fmt-check"
      - "check-loc"
      - "check-provenance"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
    options:
      runInCI: "always"

  build:
    command: "cargo build --workspace"
    deps:
      - "clippy"
    inputs:
      - "@globs(sources)"
    options:
      runInCI: "always"

  test:
    command: "cargo nextest run --workspace"
    deps:
      - "build"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
    options:
      runInCI: "always"

  check-loc:
    command: "./scripts/check-loc-limit.sh"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
    options:
      runInCI: "always"

  check-provenance:
    command: "./scripts/check-provenance.sh"
    inputs:
      - "docs/provenance/imported-repos.md"
      - "scripts/check-provenance.sh"
    options:
      runInCI: "always"

  check:
    deps:
      - "fmt-check"
      - "clippy"
      - "check-loc"
      - "check-provenance"
    options:
      runInCI: false
