---
name: PR

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel a superseded run when the same PR or branch gets a new push,
# so updating a PR branch never leaves two gates running at once.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr:
    name: PR gate
    # GitHub PR merges into main are committed by web-flow and use either
    # "Merge pull request #N" or squash/rebase "(#N)" messages.
    if: >-
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        !(
          github.event.head_commit.committer.username == 'web-flow' &&
          (
            startsWith(github.event.head_commit.message, 'Merge pull request #') ||
            contains(github.event.head_commit.message, '(#')
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Moon toolchain
        uses: moonrepo/setup-toolchain@v0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Single CI gate: moon ci runs fmt-check, clippy, build, nextest test,
      # and the LOC/provenance checks (all runInCI tasks in moon.yml).
      - name: Moon CI
        run: moon ci

      - name: Lilo binary smoke test
        run: |
          ./target/debug/lilo --version
          ./target/debug/lilo doctor --output json | jq .
