---
name: PR

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

# Cancel a superseded run when the same PR or branch gets a new push,
# so updating a PR branch never leaves two gates running at once.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Decide whether to run
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Skip merge-commit pushes already gated by their PR
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # push to main: run only for direct pushes, not PR merges.
          # A merge/squash commit is associated with its PR; a direct
          # push to main has no associated PR.
          count=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  pr:
    name: PR gate
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Moon toolchain
        uses: moonrepo/setup-toolchain@v0

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy with warnings as errors
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace
        run: cargo test --workspace

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Moon CI
        run: moon ci

      - name: Lilo binary smoke test
        run: |
          ./target/debug/lilo --version
          ./target/debug/lilo doctor --output json | jq .
